<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predict - Credit Card Approval</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="fas fa-credit-card me-2"></i>Credit<span class="fw-light">Approval</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/about"><i class="fas fa-info-circle me-1"></i>About</a></li>
        <li class="nav-item"><a class="nav-link active" href="/predict"><i class="fas fa-robot me-1"></i>Predict</a></li>
        <li class="nav-item"><a class="nav-link" href="/performance"><i class="fas fa-chart-bar me-1"></i>Performance</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="page-banner">
  <div class="container text-center">
    <h1><i class="fas fa-file-alt me-2"></i>Credit Card Application</h1>
    <p class="text-muted">Fill in your details below for instant eligibility assessment</p>
  </div>
</section>

<section class="form-section py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="form-card">
          <div class="form-card-header">
            <i class="fas fa-edit me-2"></i>Applicant Information
          </div>
          <div class="form-card-body">
            <form action="/predict" method="POST" id="predictForm">
              <div class="row g-3">

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-venus-mars me-1"></i> Gender</label>
                  <select class="form-select" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                  </select>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-car me-1"></i> Own Car</label>
                  <select class="form-select" name="own_car" required>
                    <option value="">Select</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                  </select>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-home me-1"></i> Own Real Estate</label>
                  <select class="form-select" name="own_realty" required>
                    <option value="">Select</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                  </select>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-dollar-sign me-1"></i> Annual Income</label>
                  <input type="number" class="form-control" name="annual_income" placeholder="e.g. 50000" min="0" step="0.01" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-briefcase me-1"></i> Income Type</label>
                  <select class="form-select" name="income_type" required>
                    <option value="">Select</option>
                    <option value="Working">Working</option>
                    <option value="Commercial associate">Commercial Associate</option>
                    <option value="Pensioner">Pensioner</option>
                    <option value="Student">Student</option>
                    <option value="Unemployed">Unemployed</option>
                  </select>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-graduation-cap me-1"></i> Education</label>
                  <select class="form-select" name="education" required>
                    <option value="">Select</option>
                    <option value="Higher education">Higher Education</option>
                    <option value="Secondary">Secondary</option>
                    <option value="Primary">Primary</option>
                    <option value="Academic degree">Academic Degree</option>
                  </select>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-users me-1"></i> Family Status</label>
                  <select class="form-select" name="family_status" required>
                    <option value="">Select</option>
                    <option value="Single">Single</option>
                    <option value="Married">Married</option>
                    <option value="Separated">Separated</option>
                    <option value="Widow">Widow</option>
                  </select>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-building me-1"></i> Housing Type</label>
                  <select class="form-select" name="housing_type" required>
                    <option value="">Select</option>
                    <option value="Own">Own</option>
                    <option value="Rent">Rent</option>
                    <option value="With parents">With Parents</option>
                  </select>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-calendar-alt me-1"></i> Age</label>
                  <input type="number" class="form-control" name="age" placeholder="e.g. 35" min="18" max="100" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-clock me-1"></i> Employment Duration (years)</label>
                  <input type="number" class="form-control" name="employment_duration" placeholder="e.g. 5" min="0" step="0.5" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-money-bill-wave me-1"></i> EMI Paid Off</label>
                  <input type="number" class="form-control" name="emi_paid" placeholder="e.g. 2" min="0" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-exclamation-triangle me-1"></i> EMI Past Dues</label>
                  <input type="number" class="form-control" name="emi_past_due" placeholder="e.g. 0" min="0" required>
                </div>

                <div class="col-md-4">
                  <label class="form-label"><i class="fas fa-list me-1"></i> Number of Existing Loans</label>
                  <input type="number" class="form-control" name="num_loans" placeholder="e.g. 1" min="0" required>
                </div>

              </div>

              <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg px-5" id="predictBtn">
                  <i class="fas fa-search me-2"></i>Check Eligibility
                </button>
                <button type="reset" class="btn btn-outline-secondary btn-lg px-4 ms-2">
                  <i class="fas fa-undo me-2"></i>Reset
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="footer py-4">
  <div class="container text-center">
    <p class="mb-0 text-muted">&copy; 2026 Credit Card Approval Prediction System</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('predictForm')?.addEventListener('submit', function(e) {
  var btn = document.getElementById('predictBtn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Processing...';
});
</script>
</body>
</html>
